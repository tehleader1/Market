<body>
  <div class="corner-auth" id="cornerAuth">
    <button class="corner-auth-toggle" id="cornerAuthToggle" type="button" aria-expanded="false">Member Login</button>
    <div class="corner-auth-panel" id="cornerAuthPanel" hidden>
      <p class="eyebrow">Special Access</p>
      <strong id="authStatus">Logged out</strong>
      <p id="authText" class="corner-auth-text">Compact login for premium members without blocking the readers.</p>
      <label class="trade-field corner-auth-field">
        <span>Email</span>
        <input id="authEmailInput" type="email" placeholder="name@email.com" />
      </label>
      <div class="corner-auth-actions">
        <button id="googleLoginBtn" class="corner-auth-google" type="button">Continue with Google</button>
        <button id="logoutBtn" class="corner-auth-logout" type="button">Logout</button>
      </div>
    </div>
  </div>

  <main class="dashboard">
    <!-- GLOBAL TRACKER INSERTED HERE -->

        <p class="eyebrow">Stock Option Signal Reader</p>

      </div>

      <!-- rest unchanged -->

    </section>
